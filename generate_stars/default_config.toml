[app]
application_id = "com.twenty.generate-stars"
title = "Star Cluster Generator"
language = "auto"
css = '''
window {
  background: #0b0f14;
  color: #e6ebf2;
}

.sidebar {
  background: #121821;
  border-right: 1px solid rgba(255, 255, 255, 0.08);
}

.panel {
  background: #161d27;
  border-radius: 10px;
  padding: 12px;
}

.panel-title {
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.04em;
  color: #f4f7fb;
}

entry selection,
entry selection:focus,
spinbutton text selection,
spinbutton text selection:focus,
textview text selection,
textview text selection:focus {
  background-color: #5d88e7;
  color: #fdfefe;
}

.canvas-shell {
  background: #0b0f14;
}

.canvas {
  background: #0b0f14;
}

.generate-button {
  min-height: 42px;
  font-weight: 700;
}

.status-error {
  color: #ff8d8d;
}

.status-success {
  color: #89d7a0;
}
'''

[window]
default_width = 1320
default_height = 840

[defaults]
cluster_radius = 5.0
cluster_width = 5.0
cluster_height = 5.0
function_expression = "0"
function_orientation = "y_of_x"
function_range_start = -10.0
function_range_end = 10.0
function_thickness = 0.1
total_cluster_stars = 1000
deviation_percent = 20.0
star_parameter_enabled = false
star_parameter_name = "Value"
star_parameter_min_value = 0.0
star_parameter_max_value = 1.0
star_parameter_mode = "random"
star_parameter_function_body = "return \"value\""
trash_star_count = 80
trash_min_distance = 5.0
trash_max_distance = 30.0
viewport_scale = 10.0
default_save_filename = "stars.txt"

[limits]
size_min = 1.0
size_max = 5000.0
function_range_min = -10000.0
function_range_max = 10000.0
function_thickness_min = 0.1
function_thickness_max = 5000.0
total_stars_min = 0
total_stars_max = 5000000
deviation_percent_min = 0.0
deviation_percent_max = 500.0
star_parameter_value_min = -1000000.0
star_parameter_value_max = 1000000.0
trash_star_count_min = 0
trash_star_count_max = 5000000
trash_distance_min = 0.0
trash_distance_max = 10000.0

[ui]
sidebar_width = 360
sidebar_spacing = 12
sidebar_content_spacing = 14
sidebar_footer_spacing = 8
sidebar_margin = 18
panel_spacing = 10
row_spacing = 10
cluster_section_spacing = 8
spin_page_multiplier = 10.0
integer_spin_width_chars = 8
decimal_spin_width_chars = 10

[canvas]
default_width = 900
default_height = 720
center_marker_radius_px = 7.0
cluster_hit_tolerance_px = 6.0
zoom_factor = 1.12
min_viewport_scale = 0.1
max_viewport_scale = 120.0
grid_target_spacing_px = 90.0
axis_label_font_size = 11.0
axis_label_margin_px = 8.0
axis_label_edge_margin_px = 4.0
origin_marker_radius = 3.0
grid_line_width = 1.0
axis_line_width = 1.4
cluster_outline_width = 2.0
hover_info_margin_px = 14.0
hover_info_padding_px = 12.0
hover_info_font_size = 12.0
hover_info_line_spacing_px = 6.0

[colors]
canvas_background = [0.06, 0.08, 0.11]
grid = [0.7, 0.72, 0.78, 0.08]
axis = [0.85, 0.88, 0.92, 0.24]
axis_label = [0.86, 0.89, 0.94, 0.82]
active_cluster_outline = [0.48, 0.72, 0.98, 0.9]
inactive_cluster_outline = [0.87, 0.89, 0.94, 0.72]
active_cluster_marker = [0.48, 0.72, 0.98, 0.95]
inactive_cluster_marker = [0.96, 0.98, 1.0, 0.95]
hover_info_background = [0.08, 0.11, 0.15, 0.88]
hover_info_title = [0.48, 0.72, 0.98, 0.98]
hover_info_text = [0.95, 0.97, 1.0, 0.94]

[generation]
layout_ring_padding = 10.0
layout_origin_padding = 5.0
empty_cluster_bounds_limit = 150.0
trash_bounds_padding_min = 20.0
trash_bounds_padding_extra = 10.0
trash_placement_attempts_min = 5000
trash_placement_attempts_per_star = 2000
function_sample_count = 96
export_coordinate_precision = 6
