name: Build Bundles

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  linux:
    name: Linux Bundle
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            binutils \
            python3 \
            python3-pip \
            python3-gi \
            python3-gi-cairo \
            gir1.2-gtk-4.0 \
            libgtk-4-1

      - name: Install PyInstaller
        run: python3 -m pip install --user pyinstaller

      - name: Build bundle
        run: PATH="$HOME/.local/bin:$PATH" python3 scripts/build_bundle.py --target linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: generate-stars-linux
          path: dist/generate-stars-linux-*.tar.xz

  windows:
    name: Windows Bundle
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: false
          cache: true
          install: >-
            mingw-w64-ucrt-x86_64-python
            mingw-w64-ucrt-x86_64-python-pip
            mingw-w64-ucrt-x86_64-python-gobject
            mingw-w64-ucrt-x86_64-gtk4

      - name: Cache pip (Windows)
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.pip-cache
          key: windows-pip-${{ runner.os }}-${{ hashFiles('packaging/generate-stars.spec', 'scripts/build_bundle.py') }}
          restore-keys: |
            windows-pip-${{ runner.os }}-

      - name: Install PyInstaller
        shell: msys2 {0}
        env:
          PIP_CACHE_DIR: ${{ github.workspace }}/.pip-cache
        run: python -m pip install --user pyinstaller

      - name: Build bundle
        shell: msys2 {0}
        run: PATH="$HOME/.local/bin:$PATH" python scripts/build_bundle.py --target windows

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: generate-stars-windows
          path: dist/generate-stars-windows-*.zip

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs:
      - linux
      - windows
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: generate-stars-linux
          path: dist

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: generate-stars-windows
          path: dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.xz
            dist/*.zip
          generate_release_notes: true
