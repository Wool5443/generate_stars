name: Build Bundles

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  linux:
    name: Linux Bundle
    runs-on: ubuntu-latest
    container: fedora:rawhide

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          dnf install -y \
            binutils \
            python3 \
            python3-pip \
            python3-gobject \
            cairo-gobject \
            gtk4

      - name: Install PyInstaller
        run: python3 -m pip install --user pyinstaller

      - name: Build bundle
        run: PATH="$HOME/.local/bin:$PATH" python3 scripts/build_bundle.py --target linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: generate-stars-linux
          path: dist/generate-stars-linux-*.tar.xz

  windows:
    name: Windows Bundle
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-python
            mingw-w64-ucrt-x86_64-python-pip
            mingw-w64-ucrt-x86_64-python-gobject
            mingw-w64-ucrt-x86_64-gtk4

      - name: Install PyInstaller
        shell: msys2 {0}
        run: python -m pip install --user pyinstaller

      - name: Build bundle
        shell: msys2 {0}
        run: PATH="$HOME/.local/bin:$PATH" python scripts/build_bundle.py --target windows

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: generate-stars-windows
          path: dist/generate-stars-windows-*.zip
